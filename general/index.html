<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一般主題文章索引｜網站編輯部</title>
  <meta name="description" content="一般主題文章索引頁，收錄投資、生活、資訊整理等中性主題內容。" />
  <meta name="keywords" content="一般文章,資訊網站,投資文章,內容索引" />
  <link rel="canonical" href="https://eason1388.github.io/fengshui-site/general/" />
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2a37;
      --muted: #5b6777;
      --primary: #1f5fbf;
      --line: #dbe4f0;
      --shadow: 0 14px 36px rgba(23, 45, 77, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.75;
    }
    .container {
      width: min(1000px, calc(100% - 32px));
      margin: 0 auto;
    }
    header {
      padding: 72px 0 36px;
      text-align: center;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 5vw, 52px);
    }
    p { color: var(--muted); }
    .grid {
      display: grid;
      gap: 20px;
      padding-bottom: 64px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .card a {
      color: var(--primary);
      font-weight: 800;
      text-decoration: none;
    }
    .meta { font-size: 14px; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>
  <header class="container">
    <h1>一般主題文章索引</h1>
    <p>這裡收錄非風水類的資訊型文章，方便快速瀏覽與導覽。</p>
  </header>

  <main class="container">
    <div class="grid">
      <article class="card">
        <a href="current-stock-market-analysis.html">現今股市的分析｜市場趨勢、風險與投資人關注重點</a>
        <p>從總體經濟、產業輪動、估值與風險管理切入，整理當前股市脈絡與觀察方向。</p>
        <div class="meta">更新日期：2026-03-18｜作者：網站編輯部</div>
      </article>
    </div>
  </main>
</body>
</html>
